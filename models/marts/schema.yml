version: 2
models:
  - name: customer_revenue
    description: Revenue per customer and region (demo critical model).
    config:
      meta:
        semantic_risk_critical: true
  - name: customer_ltv
    description: >
      Customer lifetime value + regional rollup. Reads customer_revenue, so it is a
      downstream consumer of it — this is what makes the "impacted models" list non-empty
      when customer_revenue changes.
