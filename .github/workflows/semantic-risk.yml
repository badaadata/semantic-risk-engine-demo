name: Semantic Risk
on: pull_request
permissions:
  contents: read
  pull-requests: write   # required - the action posts the verdict as a PR comment
jobs:
  risk:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb
      - uses: badaadata/semantic-risk-engine-action@v1
        id: risk
        continue-on-error: true   # shadow mode - an API hiccup must never fail the build
        with:
          api_key: ${{ secrets.SEMANTIC_RISK_API_KEY }}

      # Demo (#6) - consume the verdict via outputs.highest_severity. The action itself
      # never blocks the merge; your own follow-up steps decide policy. This one only
      # annotates, to show the mechanism. Values: HIGH / MEDIUM / LOW / INFO / NONE.
      - name: Flag PRs that need a second reviewer
        if: steps.risk.outputs.highest_severity == 'HIGH'
        run: echo "::notice::HIGH semantic risk on this PR - a second reviewer is required (highest_severity=${{ steps.risk.outputs.highest_severity }})."
